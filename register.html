<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Leafy Lens</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body class="login-page">

<div class="overlay">

    <div class="login-box">

        <h1>🌿 Register</h1>

        <form method="POST">

            <input type="text"
                   name="fullname"
                   placeholder="Full Name"
                   required>

            <input type="email"
                   name="email"
                   placeholder="Email"
                   required>

            <input type="text"
                   name="username"
                   placeholder="Username"
                   required>

            <input type="password"
                   name="password"
                   placeholder="Password"
                   required>

            <input type="password"
                   name="confirm_password"
                   placeholder="Confirm Password"
                   required>

            <button type="submit">
                Create Account
            </button>

        </form>

        <div class="signup-text">
            Already have an account?
            <a href="{{ url_for('login') }}">Login</a>
        </div>

    </div>

</div>

</body>
</html>
